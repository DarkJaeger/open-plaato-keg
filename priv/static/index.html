<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kegs</title>
    <style>
      @import url("style.css");
    </style>
</head>
<body>
  <div id="header_container">
    <div id="page_container" class="container pageEntry"></div>
    <nav class="navbar" role="navigation" aria-label="main navigation">
      <div class="navbar-brand">
        <a
          role="button"
          class="navbar-burger burger"
          aria-label="menu"
          aria-expanded="false"
          data-target="navbarMenu"
        >
          <span aria-hidden="true"></span>
          <span aria-hidden="true"></span>
          <span aria-hidden="true"></span>
        </a>
      </div>

      <div id="navbarMenu" class="navbar-menu">
        <div class="navbar-start">
          <a class="navbar-item" href="/index.html">Home</a>
          <a class="navbar-item" href="/taplist.html">Tap List</a>
          <a class="navbar-item" href="/history.html">History</a>
          <div class="navbar-item has-dropdown" id="configureDropdown">
            <a class="navbar-link" onclick="toggleDropdown(event)">Configure</a>
            <div class="navbar-dropdown">
              <a class="navbar-item" href="/taplist-setup.html">Tap Setup</a>
              <a class="navbar-item" href="/tap-handles.html">Tap Handles</a>
              <a class="navbar-item" href="/setup.html">Keg Setup</a>
              <a class="navbar-item" href="/airlock-setup.html">Airlock Setup</a>
              <a class="navbar-item" href="/transfer-scales.html">Transfer Scales</a>
              <a class="navbar-item" href="/beverages.html">Beverages</a>
            </div>
          </div>
        </div>
        <div class="navbar-end">
          <span class="navbar-item" id="serverVersion" style="font-size:0.75rem;opacity:0.5;"></span>
        </div>
      </div>
    </nav>
  </div>

    <section class="section">
        <div class="container">
            <h1 class="title is-1">Kegs</h1>
            <div class="columns is-multiline" id="kegContainer"></div>
        </div>
    </section>

    <section class="section" id="airlockSection">
        <div class="container">
            <h1 class="title is-1">Airlocks</h1>
            <p class="subtitle">Fermentation airlocks (temperature and bubbles per minute)</p>
            <div class="columns is-multiline" id="airlockContainer"></div>
        </div>
    </section>
  </div>

    <script>
      // Navbar burger menu
      document.querySelectorAll('.navbar-burger').forEach(el =>
        el.addEventListener('click', () => {
          document.getElementById(el.dataset.target).classList.toggle('is-active');
          el.classList.toggle('is-active');
        })
      );

      // Server version
      fetch('/api/alive')
        .then(r => r.json())
        .then(d => { if (d.version) document.getElementById('serverVersion').textContent = 'v' + d.version; })
        .catch(() => {});

      // Configure dropdown (click to toggle on desktop; hover handled by CSS)
      function toggleDropdown(e) {
        e.preventDefault();
        document.getElementById('configureDropdown').classList.toggle('is-open');
      }
      document.addEventListener('click', e => {
        if (!e.target.closest('#configureDropdown'))
          document.getElementById('configureDropdown')?.classList.remove('is-open');
      });

        const kegContainer = document.getElementById('kegContainer');

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Escape a string for safe use inside a CSS attribute selector [attr="value"]
        function cssEscapeAttrValue(str) {
            if (str == null || typeof str !== 'string') return '';
            return String(str).replace(/\\/g, '\\\\').replace(/"/g, '\\"');
        }

        function createKegCard(kegData) {
            const column = document.createElement('div');
            column.classList.add('column', 'is-half');

            const amountLeft = parseFloat(kegData.amount_left) || 0;
            const temperature = parseFloat(kegData.keg_temperature);
            const percentLeft = parseFloat(kegData.percent_of_beer_left) || 0;
            const rawUnit = kegData.beer_left_unit || 'litre';
            const volumeUnit = rawUnit === 'litre' ? 'L' : rawUnit;
            const tempUnit = kegData.temperature_unit || '°C';

            const lastPour = parseFloat(kegData.last_pour) || 0;
            const isPouring = kegData.is_pouring && kegData.is_pouring !== "0";
            const isCO2 = kegData.keg_mode_c02_beer === "2";

            const pourConversions = { lbs: [16, 'oz'], kg: [1000, 'g'], gal: [128, 'oz'], litre: [1000, 'ml'], 'kg CO\u2082': [1000, 'g'], 'lbs CO\u2082': [16, 'oz'] };
            const [pourMult, pourUnit] = pourConversions[rawUnit] || [1, volumeUnit];
            const pourValue = lastPour * pourMult;

            const label = kegData.my_label?.trim() || '';
            const beerStyle = kegData.my_beer_style?.trim() || '';
            const kegDate = kegData.my_keg_date?.trim() || '';
            const abv = kegData.my_abv?.trim() || '';

            const displayLabel = label
                ? escapeHtml(label)
                : `<span style="color:rgba(254,252,232,0.25);font-size:0.85rem;font-weight:400;">${kegData.id.slice(0,8)}…</span>`;

            const metaParts = [
                beerStyle ? escapeHtml(beerStyle) : null,
                abv       ? escapeHtml(abv) + '%'  : null,
                kegDate   ? escapeHtml(kegDate)    : null,
            ].filter(Boolean);

            const isLow = percentLeft < 20;
            const fillPct = Math.min(100, Math.max(0, percentLeft)).toFixed(1);

            const card = `
                <div class="card keg-card${isCO2 ? ' is-co2' : ''}" data-keg-id="${kegData.id}">
                    <div class="keg-header">
                        <div class="keg-identity">
                            <div class="keg-label-name">${displayLabel}${isCO2 ? '<span class="co2-badge">CO\u2082</span>' : ''}</div>
                            ${metaParts.length ? `<div class="keg-meta">${metaParts.join(' · ')}</div>` : ''}
                        </div>
                        <div class="keg-status-row">
                            <span class="pouring-indicator ${isPouring ? 'is-pouring' : ''}" title="${isPouring ? 'Pouring' : ''}"></span>
                            <span class="keg-temp-badge">${!isNaN(temperature) ? temperature.toFixed(1) + tempUnit : '--'}</span>
                        </div>
                    </div>
                    <div class="keg-volume">
                        <span class="keg-volume-number">${amountLeft.toFixed(2)}</span><span class="keg-volume-unit">${volumeUnit}</span>
                    </div>
                    <div class="keg-remaining">
                        <div class="keg-progress-track">
                            <div class="keg-progress-fill${isLow ? ' is-low' : ''}" style="width:${fillPct}%"></div>
                        </div>
                        <div class="keg-remaining-text">${percentLeft.toFixed(1)}% ${isCO2 ? 'CO\u2082 remaining' : 'remaining'}</div>
                    </div>
                    ${!isCO2 && lastPour > 0 ? `<div class="keg-footer"><span class="keg-last-pour">Last pour · ${Math.round(pourValue)} ${pourUnit}</span></div>` : ''}
                </div>
            `;
            column.innerHTML = card;
            return column;
        }

        const airlockContainer = document.getElementById('airlockContainer');
        const airlockSection = document.getElementById('airlockSection');
        const tempUnit = '°C';

        function createAirlockCard(airlockData) {
            const column = document.createElement('div');
            column.classList.add('column', 'is-one-third');
            const temp = airlockData.temperature != null ? parseFloat(airlockData.temperature) : NaN;
            const bpm = airlockData.bubbles_per_min != null ? parseFloat(airlockData.bubbles_per_min) : NaN;
            const label = (airlockData.label && airlockData.label.trim()) ? escapeHtml(airlockData.label.trim()) : 'Airlock';
            const card = `
                <div class="card airlock-card" data-airlock-id="${escapeHtml(airlockData.id)}">
                    <div class="card-content">
                        <p class="title is-5">${label}</p>
                        <div class="airlock-row">
                            ${!isNaN(temp) ? `<span class="airlock-value">${temp.toFixed(1)}${tempUnit}</span>` : ''}
                            ${!isNaN(bpm) ? `<span class="airlock-value">${bpm.toFixed(1)} bpm</span>` : ''}
                        </div>
                    </div>
                </div>
            `;
            column.innerHTML = card;
            return column;
        }

        // Fetch initial keg data
        fetch('/api/kegs')
            .then(response => response.json())
            .then(kegs => {
                if (kegs.length === 0) {
                    kegContainer.innerHTML = '<div class="column"><p class="has-text-grey">No kegs found. Connect a keg to see data here.</p></div>';
                } else {
                    kegs.forEach(keg => {
                        kegContainer.appendChild(createKegCard(keg));
                    });
                }
            })
            .catch(err => {
                kegContainer.innerHTML = '<div class="column"><p class="has-text-danger">Error loading kegs: ' + err.message + '</p></div>';
            });

        function loadAirlocks() {
            fetch('/api/airlocks')
                .then(response => response.json())
                .then(airlocks => {
                    if (airlocks.length === 0) {
                        airlockContainer.innerHTML = '<div class="column"><p class="has-text-grey">No airlocks yet. Send data to <code>POST /api/airlocks/:id/data</code> to add one.</p></div>';
                    } else {
                        airlockContainer.innerHTML = '';
                        airlocks.forEach(airlock => {
                            airlockContainer.appendChild(createAirlockCard(airlock));
                        });
                    }
                })
                .catch(err => {
                    airlockContainer.innerHTML = '<div class="column"><p class="has-text-danger">Error loading airlocks: ' + err.message + '</p></div>';
                });
        }

        // Check global config to see if airlock support is enabled; hide section and skip loading if disabled
        fetch('/api/config')
            .then(response => response.ok ? response.json() : Promise.reject())
            .then(cfg => {
                const enabled = cfg.airlock_enabled !== false;
                if (!enabled && airlockSection) {
                    airlockSection.style.display = 'none';
                } else {
                    loadAirlocks();
                }
            })
            .catch(() => {
                // On error, fall back to previous behavior (show airlocks)
                loadAirlocks();
            });

        // WebSocket connection
        const socket = new WebSocket('/ws');

        socket.addEventListener('open', (event) => {
            console.log('WebSocket connection opened:', event);
        });

        socket.addEventListener('message', (event) => {
            const msg = JSON.parse(event.data);
            if (msg.type === 'airlock') {
                const data = msg.data;
                const airlockId = data.id;
                const existingCard = document.querySelector(`#airlockContainer [data-airlock-id="${cssEscapeAttrValue(airlockId)}"]`);
                if (existingCard) {
                    const newCol = createAirlockCard(data);
                    const col = existingCard.closest('.column');
                    if (col) col.innerHTML = newCol.innerHTML;
                } else if (airlockId) {
                    airlockContainer.appendChild(createAirlockCard(data));
                }
            } else {
                const updatedKeg = msg;
                const kegId = updatedKeg.id;
                const existingCard = document.querySelector(`#kegContainer [data-keg-id="${cssEscapeAttrValue(kegId)}"]`);
                if (existingCard) {
                    const newCard = createKegCard(updatedKeg);
                    existingCard.innerHTML = newCard.querySelector('.card').innerHTML;
                } else if (kegId) {
                    kegContainer.appendChild(createKegCard(updatedKeg));
                }
            }
        });

        socket.addEventListener('error', (error) => {
            console.error('WebSocket error:', error);
        });

        socket.addEventListener('close', (event) => {
            console.log('WebSocket connection closed:', event);
        });
    </script>

</body>
</html>
